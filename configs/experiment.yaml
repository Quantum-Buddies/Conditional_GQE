seed: 42
dataset:
  basis: "sto-3g"
  molecules:
    - name: "h2"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 0.74]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "lih"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.6]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "beh2"
      geometry:
        - ["Be", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.3]]
        - ["H", [0.0, 0.0, -1.3]]
      charge: 0
      multiplicity: 1
      split: "val"
    - name: "n2"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 1.1]]
      charge: 0
      multiplicity: 1
      split: "val"
    # Halogenated benchmark: iodobenzene (C6H5I)
    # Active space = 4 electrons / 4 orbitals -> 8 qubits for STO-3G.
    # Geometry uses standard benzene ring parameters (C-C = 1.40 A, C-H = 1.08 A)
    # with a C-I bond length of ~2.10 A.
    - name: "iodobenzene"
      geometry:
        - ["I", [3.500, 0.000, 0.000]]
        - ["C", [1.400, 0.000, 0.000]]
        - ["C", [0.700, 1.212, 0.000]]
        - ["C", [-0.700, 1.212, 0.000]]
        - ["C", [-1.400, 0.000, 0.000]]
        - ["C", [-0.700, -1.212, 0.000]]
        - ["C", [0.700, -1.212, 0.000]]
        - ["H", [1.240, 2.147, 0.000]]
        - ["H", [-1.240, 2.147, 0.000]]
        - ["H", [-2.480, 0.000, 0.000]]
        - ["H", [-1.240, -2.147, 0.000]]
        - ["H", [1.240, -2.147, 0.000]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 4
        n_active_orbitals: 4
training:
  synthetic_samples: 256
  epochs: 5
  batch_size: 8
  learning_rate: 0.0005
  max_seq_len: 64
model:
  vocab_size: 64
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
baselines:
  max_iterations: 150
  optimizer: "SLSQP"
