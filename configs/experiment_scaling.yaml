        - ["H", [0.0, 0.0, 1.6]]
      charge: 0
      multiplicity: 1
      split: "val"
      # Full STO-3G: 4e, 6orb = 12 qubits

    - name: "n2_1.1_full"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 1.1]]
      charge: 0
      multiplicity: 1
      split: "val"
      # Full STO-3G: 14e, 10orb = 20 qubits

