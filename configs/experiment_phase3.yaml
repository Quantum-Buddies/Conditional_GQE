seed: 42
dataset:
  basis: "sto-3g"
  molecules:
    # === Bond dissociation curves for training generalization ===
    # H2 at multiple bond lengths
    - name: "h2_0.5"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 0.5]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "h2_0.74"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 0.74]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "h2_1.0"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.0]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "h2_1.5"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.5]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "h2_2.0"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 2.0]]
      charge: 0
      multiplicity: 1
      split: "val"

    # LiH at multiple bond lengths
    - name: "lih_1.2"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.2]]
      charge: 0
      multiplicity: 1
      split: "train"
      active_space:
        mode: "explicit"
        n_active_electrons: 2
        n_active_orbitals: 4
    - name: "lih_1.6"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.6]]
      charge: 0
      multiplicity: 1
      split: "train"
      active_space:
        mode: "explicit"
        n_active_electrons: 2
        n_active_orbitals: 4
    - name: "lih_2.0"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 2.0]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 2
        n_active_orbitals: 4
    - name: "lih_3.0"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 3.0]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 2
        n_active_orbitals: 4

    # N2 at multiple bond lengths (stretched = strongly correlated)
    - name: "n2_1.1"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 1.1]]
      charge: 0
      multiplicity: 1
      split: "train"
      active_space:
        mode: "explicit"
        n_active_electrons: 6
        n_active_orbitals: 6
    - name: "n2_1.8"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 1.8]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 6
        n_active_orbitals: 6
    - name: "n2_2.5"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 2.5]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 6
        n_active_orbitals: 6

    # === EUV photoresist relevant molecules ===
    # Iodobenzene (C6H5I) - already in original config, kept for continuity
    - name: "iodobenzene"
      geometry:
        - ["I", [3.500, 0.000, 0.000]]
        - ["C", [1.400, 0.000, 0.000]]
        - ["C", [0.700, 1.212, 0.000]]
        - ["C", [-0.700, 1.212, 0.000]]
        - ["C", [-1.400, 0.000, 0.000]]
        - ["C", [-0.700, -1.212, 0.000]]
        - ["C", [0.700, -1.212, 0.000]]
        - ["H", [1.240, 2.147, 0.000]]
        - ["H", [-1.240, 2.147, 0.000]]
        - ["H", [-2.480, 0.000, 0.000]]
        - ["H", [-1.240, -2.147, 0.000]]
        - ["H", [1.240, -2.147, 0.000]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 4
        n_active_orbitals: 4

    # Methyl iodide (CH3I) - simplest iodinated molecule, EUV absorber
    # C-I bond ~2.14 A, C-H ~1.09 A, tetrahedral geometry
    - name: "methyl_iodide"
      geometry:
        - ["I", [0.0, 0.0, 2.14]]
        - ["C", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 1.03, -0.36]]
        - ["H", [0.893, -0.515, -0.36]]
        - ["H", [-0.893, -0.515, -0.36]]
      charge: 0
      multiplicity: 1
      split: "val"
      active_space:
        mode: "explicit"
        n_active_electrons: 4
        n_active_orbitals: 4

    # 4-iodo-2-methylphenol (IMePh) - the key EUV photoresist monomer
    # from Xanadu/Mitsubishi paper (arXiv:2602.20234)
    # Using a small active space focused on iodine 4d / C-I bond region
    - name: "imeph"
      geometry:
        # Phenol ring
        - ["C", [0.000, 1.400, 0.000]]
        - ["C", [1.212, 0.700, 0.000]]
        - ["C", [1.212, -0.700, 0.000]]
        - ["C", [0.000, -1.400, 0.000]]
        - ["C", [-1.212, -0.700, 0.000]]
        - ["C", [-1.212, 0.700, 0.000]]
        # OH group at position 2 (ortho to iodine at position 4)
        - ["O", [2.420, 1.400, 0.000]]
        - ["H", [2.900, 2.200, 0.000]]
        # Methyl at position 2 (ortho to iodine, meta to OH)
        - ["C", [-2.420, 1.400, 0.000]]
        - ["H", [-3.020, 1.000, 0.870]]
        - ["H", [-3.020, 1.000, -0.870]]
        - ["H", [-2.200, 2.400, 0.000]]
        # Iodine at position 4 (para to OH)
        - ["I", [0.000, 3.500, 0.000]]
        # Remaining ring H (3 positions: C3, C4, C5)
        - ["H", [2.147, -1.240, 0.000]]
        - ["H", [0.000, -2.480, 0.000]]
        - ["H", [-2.147, -1.240, 0.000]]
      charge: 0
      multiplicity: 1
      split: "test"
      active_space:
        mode: "explicit"
        n_active_electrons: 4
        n_active_orbitals: 4

    # Phenol (C6H5OH) - non-iodinated baseline for comparison
    - name: "phenol"
      geometry:
        - ["C", [0.000, 1.400, 0.000]]
        - ["C", [1.212, 0.700, 0.000]]
        - ["C", [1.212, -0.700, 0.000]]
        - ["C", [0.000, -1.400, 0.000]]
        - ["C", [-1.212, -0.700, 0.000]]
        - ["C", [-1.212, 0.700, 0.000]]
        - ["O", [2.420, 1.400, 0.000]]
        - ["H", [2.900, 2.200, 0.000]]
        - ["H", [2.147, -1.240, 0.000]]
        - ["H", [0.000, -2.480, 0.000]]
        - ["H", [-2.147, -1.240, 0.000]]
        - ["H", [-2.480, 1.240, 0.000]]
        - ["H", [0.000, 2.480, 0.000]]
      charge: 0
      multiplicity: 1
      split: "test"
      active_space:
        mode: "explicit"
        n_active_electrons: 4
        n_active_orbitals: 4

    # BeH2 at equilibrium and stretched
    - name: "beh2_1.3"
      geometry:
        - ["Be", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.3]]
        - ["H", [0.0, 0.0, -1.3]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "beh2_2.0"
      geometry:
        - ["Be", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 2.0]]
        - ["H", [0.0, 0.0, -2.0]]
      charge: 0
      multiplicity: 1
      split: "val"

training:
  synthetic_samples: 256
  epochs: 5
  batch_size: 8
  learning_rate: 0.0005
  max_seq_len: 64
model:
  vocab_size: 64
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
baselines:
  max_iterations: 150
  optimizer: "SLSQP"
