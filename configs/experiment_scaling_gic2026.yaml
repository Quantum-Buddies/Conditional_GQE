      - ["C", [-1.212, 0.700, 0.000]]
      - ["O", [2.420, 1.400, 0.000]]
      - ["I", [-2.420, 1.400, 0.000]]
      - ["C", [2.147, -1.240, 0.000]]   # methyl group
      - ["H", [2.900, 2.200, 0.000]]
      - ["H", [0.000, -2.480, 0.000]]
      - ["H", [-2.147, -1.240, 0.000]]
    charge: 0
    multiplicity: 1
    split: "test"
    active_space:
      mode: "explicit"
      n_active_electrons: 6
      n_active_orbitals: 6
  
