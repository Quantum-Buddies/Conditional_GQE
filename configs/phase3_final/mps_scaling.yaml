# Phase 3 Final — Experiment 4: MPS scaling curve
# Demonstrate approximate quantum simulation at 24-40 qubits via MPS.
# Bond dimension sweep: D = 32, 64, 128, 256
# Compare MPS vs exact at overlapping tractable sizes (<=24 qubits).

experiment:
  name: "phase3_mps_scaling"
  seed: 42
  description: >
    Controlled MPS scaling study on nested molecular benchmark family.
    Sweep qubit counts 24, 28, 32, 36, 40 with bond dimensions 32-256.
    Compare MPS against exact state-vector at tractable sizes (<=24 qubits).

molecules:
  # Use molecules from hamiltonians_40plus that span the qubit range
  - name: "n2"
    qubits: 20
    source: "results/data/hamiltonians_40plus.json/hamiltonians.json"
    exact_reference: true
  - name: "formaldehyde"
    qubits: 24
    source: "results/data/hamiltonians_40plus.json/hamiltonians.json"
    exact_reference: true
  - name: "ethylene"
    qubits: 28
    source: "results/data/hamiltonians_40plus.json/hamiltonians.json"
    exact_reference: false
  # For 32-40 qubits, use generated H-chain or benzene active spaces
  - name: "benzene_cas20"
    qubits: 40
    source: "results/data/hamiltonians_40plus.json/hamiltonians.json"
    exact_reference: false

bond_dimensions: [32, 64, 128, 256]
truncation_cutoff: 1e-8

backend:
  exact:
    target: "nvidia"
    target_option: "mqpu"
    max_qubits: 24
  mps:
    target: "tensornet-mps"
    # L40S PCIe: single-GPU mode only (MPI tensornet not supported with pip CUDA-Q)
    single_gpu: true

report_metrics:
  - energy_hartree
  - energy_difference_vs_exact
  - runtime_seconds
  - peak_memory_mb
  - two_qubit_depth
  - bond_dimension
  - truncation_cutoff
  - convergence_status

output:
  dir: "results/phase3_final/mps"
  prefix: "mps_scaling"
