# Phase 3 Final — Experiment 3: FMO2 scalability demonstration
# Decompose IMePh (EUV photoresist precursor) into 5 fragments.
# FMO2: E = sum_I E_I + sum_{I<J} (E_IJ - E_I - E_J)
# Requires: 5 monomer + 10 dimer = 15 fragment calculations.

experiment:
  name: "phase3_fmo_imeph"
  seed: 42
  description: >
    FMO2 reconstruction of IMePh parent system. Three reconstructions:
    (1) Exact-fragment FMO2 (all fragments via exact diagonalization)
    (2) H-cGQE simulator FMO2 (all fragments via H-cGQE + L-BFGS-B)
    (3) Hybrid H-cGQE/QPU FMO2 (one fragment replaced with QPU data from Exp 2)
    Error decomposition: dE_solver vs dE_fragmentation.

parent:
  molecule: "imeph"
  basis: "sto-3g"
  charge: 0
  multiplicity: 1
  active_electrons: 4
  active_spatial_orbitals: 4
  n_qubits: 8
  reference_energy_source: "exact_diagonalization"
  hamiltonian_source: "results/data/hamiltonians_phase3.json/hamiltonians.json"

fragments:
  # Fragment definitions will be generated by src/gqe/data/fragment_molecule.py
  # Expected: 5 monomers, 10 dimers
  fragment_data: "results/data/fragments/fmo_hamiltonians.json"
  max_fragment_qubits: 8

reconstructions:
  exact:
    method: "exact_diagonalization"
    backend: "nvidia"
  hcgqe:
    checkpoint: "results/train/h_cgqe_model_phase3.pt"
    n_samples: 100
    coefficient_optimization:
      method: "L-BFGS-B"
      max_iter: 200
      top_k: 10
    backend: "nvidia"
    target_option: "mqpu"
  hybrid_qpu:
    qpu_result: "results/phase3_final/qpu/qpu_validation_result.json"
    replace_fragment: 0  # replace first fragment with QPU data

error_decomposition:
  dE_solver: "E_hcgqe_fmo2 - E_exact_fragment_fmo2"
  dE_fragmentation: "E_exact_fragment_fmo2 - E_parent_reference"

output:
  dir: "results/phase3_final/fmo"
  prefix: "fmo2_imeph"
